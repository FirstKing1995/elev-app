<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elev - Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1 class="logo-text">Elev<span>.</span></h1>
        <p class="subtitle">Área de Administração</p>

        <form id="form-login">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Seu e-mail de admin" required>
            </div>
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Sua senha secreta" required>
            </div>
            <button type="submit" id="btn-login">Entrar no Sistema</button>
        </form>
        <p id="mensagem-erro" class="erro-msg"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
